<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ya-Shop</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #d9d9d9;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    text-align: center;
}
.profile {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 6px solid #00ff00;
    object-fit: cover;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}
h1 {
    margin: 15px 0 5px;
    font-size: 32px;
}
.subtext {
    font-size: 16px;
    margin-bottom: 5px;
}
.phone {
    font-weight: bold;
    margin-bottom: 20px;
}
.button {
    width: 320px;
    margin: 15px auto;
    padding: 15px;
    border-radius: 40px;
    background: #bfbfbf;
    display: flex;
    align-items: center;
    gap: 15px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.3);
    text-decoration: none;
}
.button:hover {
    transform: scale(1.03);
}
.icon-img {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    object-fit: cover;
}
.btn-text {
    font-size: 22px;
    color: white;
    font-weight: bold;
}
</style>
</head>
<body>
<div class="container">

<img src="Photo/Profile.jpg" class="profile">

<h1>Ya-Shop</h1>
<div class="subtext">Ya-Shop ហាងលក់អនឡាញ មានទំនាក់ទំនងតាម Telegram និង Facebook</div>
<div class="phone">+855 98586869</div>

<!-- FACEBOOK BUTTON -->
<a href="https://www.facebook.com/profile.php?id=61556894439743" target="_blank" class="button">
    <img src="Facebook_Logo.png" class="icon-img">
    <div class="btn-text">Facebook Page</div>
</a>

<!-- TELEGRAM ADMIN -->
<a href="https://t.me/Chanthou_shop09" target="_blank" class="button">
    <img src="Telegram_logo.webp" class="icon-img">
    <div class="btn-text">Telegram Admin</div>
</a>

<!-- TELEGRAM GROUP -->
<a href="https://t.me/Ya_Fashion_Fusion" target="_blank" class="button">
    <img src="Telegram_logo.webp" class="icon-img">
    <div class="btn-text">Telegram Group</div>
</a>

</body>
</html>
